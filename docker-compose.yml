services:

  postgres:
    image: postgres:18.4
    environment:
      POSTGRES_DB: zeiterfassung
      POSTGRES_USER: admin_user
      POSTGRES_PASSWORD: admin_password
      POSTGRES_APP_USER: app_user
      POSTGRES_APP_PASSWORD: app_password
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 3s
      timeout: 1s
      retries: 5
    volumes:
      - ./init-user-db.sh:/docker-entrypoint-initdb.d/init-user-db.sh:ro

  mailpit:
    image: axllent/mailpit:v1.27.7
    ports:
      - '1025:1025'
      - '8025:8025'
    environment:
      MP_MAX_MESSAGES: 5000
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.2
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: '8090'
      KC_HOSTNAME_STRICT: 'false'
      KC_HOSTNAME_STRICT_HTTPS: 'false'
      KC_CACHE: 'local'
    ports:
      - '8090:8090'
    volumes:
      - ./docker/keycloak/export:/opt/keycloak/data/import

  rabbitmq:
    image: "rabbitmq:4.1.0-management"
    environment:
      RABBITMQ_DEFAULT_USER: "guest"
      RABBITMQ_DEFAULT_PASS: "guest"
    ports:
      - "5672:5672"
      - "15672:15672"

  app:
    build: .
    ports:
      - '8060:8060'
    environment:
      SPRING_PROFILES_ACTIVE: dev-singletenant
      SERVER_PORT: 8060
      # Database
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/zeiterfassung
      SPRING_DATASOURCE_USERNAME: admin_user
      SPRING_DATASOURCE_PASSWORD: admin_password
      # Mail
      SPRING_MAIL_HOST: mailpit
      SPRING_MAIL_PORT: 1025
      # OIDC — Keycloak running in Docker network (use service name, not localhost)
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_DEFAULT_CLIENT_ID: zeiterfassung
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_DEFAULT_CLIENT_SECRET: zeiterfassung-secret
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_DEFAULT_SCOPE: "openid,profile,email,roles"
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_DEFAULT_PROVIDER: default
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_DEFAULT_REDIRECT_URI: "http://localhost:8060/login/oauth2/code/{registrationId}"
      # Internal: app→keycloak (token validation, JWK, userinfo)
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_DEFAULT_ISSUER_URI: http://keycloak:8090/realms/zeiterfassung-realm
      # External: browser redirect — use localhost since port 8090 is exposed
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_DEFAULT_AUTHORIZATION_URI: http://localhost:8090/realms/zeiterfassung-realm/protocol/openid-connect/auth
      # Disable RabbitMQ autoconfigure (not needed for basic use)
      SPRING_AUTOCONFIGURE_EXCLUDE: org.springframework.boot.amqp.autoconfigure.RabbitAutoConfiguration
      # Tenant
      ZEITERFASSUNG_TENANT_MODE: single
      ZEITERFASSUNG_TENANT_SINGLE_DEFAULT_TENANT_ID: default
      ZEITERFASSUNG_DEVELOPMENT_DEMODATA_CREATE: "true"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
