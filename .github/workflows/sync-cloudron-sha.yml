name: Sync SHA to Cloudron app

on:
  push:
    branches: [main]

jobs:
  update-sha:
    runs-on: ubuntu-latest
    steps:
      - name: Update ZE_SHA in zeiterfassung-cloudron-app
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.CLOUDRON_APP_PAT }}
          script: |
            const sha = context.sha;
            const short = sha.slice(0, 7);

            // Fetch current Dockerfile
            const { data: file } = await github.rest.repos.getContent({
              owner: 'slint-ui',
              repo: 'zeiterfassung-cloudron-app',
              path: 'Dockerfile',
              ref: 'master',
            });

            const current = Buffer.from(file.content, 'base64').toString('utf8');
            const updated = current.replace(/^ARG ZE_SHA=\S+/m, `ARG ZE_SHA=${sha}`);

            if (current === updated) {
              core.info('ZE_SHA already up to date, skipping.');
              return;
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner: 'slint-ui',
              repo: 'zeiterfassung-cloudron-app',
              path: 'Dockerfile',
              message: `chore: bump ZE_SHA to ${short}\n\nTriggered by slint-ui/zeiterfassung@${sha}`,
              content: Buffer.from(updated).toString('base64'),
              sha: file.sha,
              branch: 'master',
            });

            core.info(`Updated ZE_SHA to ${sha}`);
