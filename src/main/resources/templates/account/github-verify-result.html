<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>
    <turbo-frame id="github-verify-result">
      <div th:if="${error}" class="flex items-center gap-2 text-sm text-red-600 dark:text-red-400 p-2 rounded bg-red-50 dark:bg-red-950">
        <span th:text="#{__${error}__}">Error</span>
      </div>
      <div th:if="${avatarUrl}" class="flex items-center gap-3 p-2 rounded border border-gray-200 dark:border-zinc-700">
        <img
          th:src="${avatarUrl}"
          th:alt="${username}"
          width="48"
          height="48"
          class="rounded-full w-12 h-12"
        />
        <div class="flex flex-col">
          <span class="font-medium" th:text="${displayName}">Display Name</span>
          <a
            th:href="|https://github.com/${username}|"
            th:text="|@${username}|"
            class="text-sm text-blue-600 dark:text-sky-400"
            target="_blank"
            rel="noopener noreferrer"
          >@username</a>
        </div>
      </div>
    </turbo-frame>
  </body>
</html>
