<!doctype html>
<html
  lang="en"
  th:lang="${language}"
  th:class="|theme-${theme}|"
  xmlns:th="http://www.thymeleaf.org"
>
  <head
    th:replace="~{_layout::head(title=~{::title}, scriptsDefer=~{::scriptsDefer})}"
  >
    <title th:text="#{account.page.title}"></title>
    <th:block th:fragment="scriptsDefer">
    </th:block>
  </head>
  <body th:replace="~{_layout::body(content=~{::content}, search=~{::search})}">
    <th:block th:ref="search">
      <div
        th:replace="~{fragments/user-search::user-search(placeholder=#{user-search.input.placeholder})}"
      ></div>
    </th:block>

    <th:block th:fragment="content">
      <main class="content-container content--max-w flex flex-col">
        <div class="flex-1 flex flex-col mx-auto w-full max-w-7xl px-4 desktop:px-8">
          <h1 class="text-xl font-bold" th:text="#{account.page.title}">
            My Account
          </h1>

          <div th:if="${savedSuccess}" class="mt-4 p-4 bg-green-100 dark:bg-green-900 rounded-lg text-green-800 dark:text-green-200" th:text="#{account.save.success}">
            Settings saved.
          </div>

          <div class="mt-8 flex flex-col gap-10">
            <!-- Identity section -->
            <section>
              <h2 class="text-lg font-semibold dark:text-zinc-300 mb-2" th:text="#{account.identity.section.title}">Identity</h2>
              <p class="text-sm text-dimmed mb-4" th:text="#{account.identity.managed-by-cloudron}">
                Identity is managed by Cloudron.
              </p>
              <div class="flex flex-col gap-2">
                <div class="flex flex-col gap-1">
                  <span class="text-sm font-medium text-gray-600 dark:text-zinc-400">Name</span>
                  <span class="text-base" th:text="${fullName}">Max Mustermann</span>
                </div>
                <div class="flex flex-col gap-1" th:if="${email}">
                  <span class="text-sm font-medium text-gray-600 dark:text-zinc-400">E-Mail</span>
                  <span class="text-base" th:text="${email}">max@example.com</span>
                </div>
              </div>
            </section>

            <!-- GitHub section -->
            <section>
              <h2 class="text-lg font-semibold dark:text-zinc-300 mb-2" th:text="#{account.github.section.title}">GitHub</h2>
              <form action="#" th:action="@{/account}" method="post">
                <div class="flex flex-col gap-4 max-w-md">
                  <div class="flex flex-col gap-1">
                    <label for="githubLogin" class="text-sm font-medium" th:text="#{account.github-login.label}">
                      GitHub username
                    </label>
                    <div class="flex gap-2 items-center">
                      <input
                        type="text"
                        id="githubLogin"
                        name="githubLogin"
                        th:value="${githubLogin}"
                        th:placeholder="#{account.github-login.placeholder}"
                        class="border border-gray-300 dark:border-zinc-600 rounded px-3 py-2 dark:bg-zinc-800 dark:text-zinc-100 flex-1"
                        maxlength="255"
                      />
                      <button
                        type="button"
                        class="button-secondary whitespace-nowrap"
                        th:text="#{account.github-login.verify.button}"
                        onclick="
                          const username = document.getElementById('githubLogin').value;
                          const frame = document.getElementById('github-verify-result');
                          frame.src = '/account/github-verify?username=' + encodeURIComponent(username);
                        "
                      >
                        Verify
                      </button>
                    </div>
                    <p class="text-sm text-dimmed" th:text="#{account.github-login.hint}">
                      Used to show your GitHub activity.
                    </p>
                  </div>

                  <turbo-frame id="github-verify-result" class="block min-h-0">
                  </turbo-frame>

                  <div>
                    <button
                      type="submit"
                      class="button-main-green"
                      th:text="#{account.save.button}"
                    >
                      Save
                    </button>
                  </div>
                </div>
              </form>
            </section>
          </div>
        </div>
      </main>
    </th:block>
  </body>
</html>
