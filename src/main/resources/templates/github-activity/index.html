<!doctype html>
<html
  lang="en"
  th:lang="${language}"
  th:class="|theme-${theme}|"
  xmlns:th="http://www.thymeleaf.org"
>
  <head th:replace="~{_layout::head(title=~{::title}, scriptsDefer=~{::scriptsDefer})}">
    <title th:text="#{github-activity.page.title}">GitHub Activity</title>
    <th:block th:fragment="scriptsDefer">
      <script type="module" src="" th:src="@{/assets/time-entries.js}"></script>
    </th:block>
  </head>
  <body th:replace="~{_layout::body(content=~{::content}, search=~{::search})}">
    <th:block th:ref="search">
      <div
        th:replace="~{fragments/user-search::user-search(placeholder=#{user-search.input.placeholder})}"
      ></div>
    </th:block>

    <th:block th:fragment="content">
      <!-- Hidden day context (read by JS) -->
      <input type="hidden" id="gh-date" th:value="${date}"/>
      <input type="hidden" id="gh-user-local-id" th:value="${userLocalId}"/>

      <main class="content-container content--max-w flex flex-col">
        <div class="flex-1 flex flex-col mx-auto w-full max-w-7xl px-4 desktop:px-8 pb-24">

          <h1 class="text-xl font-bold mb-6" th:text="#{github-activity.page.title}">GitHub Activity</h1>

          <!-- Date navigation -->
          <div class="flex items-center gap-4 mb-6">
            <a th:href="@{/github-activity(date=${prevDate})}" class="button-secondary">&#9664;</a>
            <span th:text="${#temporals.format(date, 'EEEE, d MMMM yyyy')}">Monday, 2 June 2026</span>
            <a th:href="@{/github-activity(date=${nextDate})}" class="button-secondary">&#9654;</a>
          </div>

          <!-- Locked notice -->
          <div th:if="${isLocked}"
               class="mb-4 flex items-center gap-2 px-4 py-2 rounded bg-amber-50 dark:bg-amber-950 border border-amber-300 dark:border-amber-700 text-sm text-amber-800 dark:text-amber-200">
            <span>🔒</span>
            <span th:text="#{github-activity.locked}">This day is locked. Time entries can no longer be added.</span>
          </div>

          <!-- Empty state -->
          <p th:if="${#lists.isEmpty(groups)}" class="text-gray-500 dark:text-zinc-400" th:text="#{github-activity.empty}">
            No GitHub activity found for this day.
          </p>

          <!-- Groups -->
          <div th:each="group, groupStat : ${groups}" class="mb-4 border border-gray-200 dark:border-zinc-700 rounded-lg overflow-hidden">

            <!-- Group header (repo name only, no bulk buttons) -->
            <div class="px-4 py-3 bg-gray-50 dark:bg-zinc-800 border-b border-gray-200 dark:border-zinc-700">
              <span class="font-semibold text-blue-700 dark:text-sky-400" th:text="${group.repoName()}"></span>
            </div>

            <!-- Events -->
            <div th:each="event, iterStat : ${group.events()}"
                 class="px-4 py-3"
                 th:classappend="${!iterStat.last ? 'border-b border-gray-100 dark:border-zinc-800' : ''}">
              <div class="flex items-start gap-3">

                <!-- Checkbox (unlocked only) -->
                <input th:if="${!isLocked}"
                       type="checkbox"
                       class="gh-event-checkbox mt-1.5 shrink-0 cursor-pointer"
                       th:data-repo="${group.repoName()}"
                       th:data-title="${event.title()}"
                       onchange="ghUpdateBar()"/>
                <!-- Spacer when locked so layout stays consistent -->
                <span th:if="${isLocked}" class="w-4 shrink-0"></span>

                <!-- Icon + text -->
                <div class="flex items-start gap-3 flex-1 min-w-0">
                  <span class="text-xl shrink-0 mt-0.5" th:text="${event.icon()}"></span>
                  <div class="flex flex-col min-w-0">
                    <span class="font-medium" th:text="${event.title()}"></span>
                    <span class="text-sm text-gray-500 dark:text-zinc-400 truncate"
                          th:if="${!#strings.isEmpty(event.detail())}"
                          th:text="${event.detail()}"></span>
                  </div>
                </div>

                <!-- Timestamp + per-event button -->
                <div class="flex items-center gap-3 shrink-0">
                  <span class="text-sm text-gray-400 dark:text-zinc-500" th:text="${event.startTime()}"></span>
                  <button th:if="${!isLocked}"
                    type="button"
                    class="button-secondary text-sm whitespace-nowrap"
                    th:data-comment="${event.prefilledComment()}"
                    th:data-date="${date}"
                    th:data-start="${event.startTime()}"
                    th:data-user-local-id="${userLocalId}"
                    th:data-frame-id="|frame-${groupStat.index}-${iterStat.index}|"
                    onclick="ghToggleInline(this)"
                    th:text="#{github-activity.add-time-entry}"
                  >+ Add time entry</button>
                </div>
              </div>

              <!-- Per-event inline form frame -->
              <turbo-frame
                th:id="|frame-${groupStat.index}-${iterStat.index}|"
                class="block mt-3"
              ></turbo-frame>
            </div>

          </div>

          <!-- Day-level inline form (opened by sticky bar) -->
          <turbo-frame id="frame-day-entry" class="block mt-2"></turbo-frame>

        </div>
      </main>

      <!-- Sticky selection bar (hidden until events are checked) -->
      <div id="gh-selection-bar"
           class="hidden fixed bottom-0 left-0 right-0 z-50 border-t border-gray-200 dark:border-zinc-700 bg-white dark:bg-zinc-900 shadow-lg px-6 py-4 flex items-center justify-between gap-4">
        <span id="gh-selection-label" class="text-sm font-medium text-gray-700 dark:text-zinc-300"></span>
        <button
          type="button"
          class="button-main-green text-sm"
          onclick="ghAddSelected()"
          th:text="#{github-activity.add-as-one-entry}"
        >Add as one entry</button>
      </div>

      <script>
        function ghUpdateBar() {
          const checked = document.querySelectorAll('.gh-event-checkbox:checked');
          const bar = document.getElementById('gh-selection-bar');
          const label = document.getElementById('gh-selection-label');
          if (checked.length === 0) {
            bar.classList.add('hidden');
          } else {
            bar.classList.remove('hidden');
            label.textContent = checked.length + ' event' + (checked.length !== 1 ? 's' : '') + ' selected';
          }
        }

        function ghAddSelected() {
          const checked = document.querySelectorAll('.gh-event-checkbox:checked');
          const date = document.getElementById('gh-date').value;
          const userLocalId = document.getElementById('gh-user-local-id').value;

          // Group titles by repo, preserving selection order
          const byRepo = new Map();
          checked.forEach(cb => {
            const repo = cb.dataset.repo;
            const title = cb.dataset.title;
            if (!byRepo.has(repo)) byRepo.set(repo, []);
            byRepo.get(repo).push(title);
          });

          const combined = [...byRepo.entries()]
            .map(([repo, titles]) => repo + ': ' + titles.join('; '))
            .join(' · ');

          const frame = document.getElementById('frame-day-entry');
          const params = new URLSearchParams({
            comment: combined,
            date: date,
            userLocalId: userLocalId,
            frameId: 'frame-day-entry'
          });
          frame.src = '/github-activity/inline-form?' + params.toString();
          frame.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function ghToggleInline(btn) {
          const frameId = btn.dataset.frameId;
          const frame = document.getElementById(frameId);
          if (frame.src) {
            frame.src = '';
            frame.innerHTML = '';
            return;
          }
          const params = new URLSearchParams({
            comment: btn.dataset.comment,
            date: btn.dataset.date,
            startTime: btn.dataset.start || '',
            userLocalId: btn.dataset.userLocalId,
            frameId: frameId
          });
          frame.src = '/github-activity/inline-form?' + params.toString();
        }
      </script>
    </th:block>

  </body>
</html>
