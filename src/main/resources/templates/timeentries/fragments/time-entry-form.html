<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="de">
  <head>
    <title>TimeEntry Form</title>
  </head>
  <body>
    <form
      th:fragment="timeentry-slot-form(formAction, timeEntry, actions, disabled, class, showReadRow)"
      is="z-time-entry-slot-form"
      action="#"
      th:action="${formAction}"
      method="post"
      data-testid="time-entry-form"
    >
      <div
        th:fragment="timeentry-slot-form-content(timeEntry, actions, class)"
        th:with="rnd=${#strings.randomAlphanumeric(6)}, disabled=${disabled ?: false}, showErrors=${showErrors ?: true}"
        class="flex flex-col-reverse md:flex-col"
        th:classappend="${class} + ' ' + ${disabled ? 'timeslot-form--disabled' : ''}"
        th:object="${timeEntry}"
      >
        <input type="hidden" name="id" th:value="*{id}" />
        <input type="hidden" name="userLocalId" th:value="*{userLocalId}" />
        <h4
          class="sr-only"
          th:text="${#temporals.format(timeEntry.date, 'dd. MMMM yyyy')}"
        ></h4>
        <th:block th:if="${showReadRow ?: false}">
          <div class="time-entry-read-row" data-read-row role="button" tabindex="0">
            <span data-read-time class="time-entry-read-row__time">
              <th:block th:if="${timeEntry.start != null}" th:text="${#temporals.format(timeEntry.start, 'HH:mm')}"></th:block>
              <th:block th:if="${timeEntry.start != null and timeEntry.end != null}">–</th:block>
              <th:block th:if="${timeEntry.end != null}" th:text="${#temporals.format(timeEntry.end, 'HH:mm')}"></th:block>
            </span>
            <span data-read-duration class="time-entry-read-row__duration" th:text="${timeEntry.duration}"></span>
            <span th:if="${timeEntry.isBreak}" data-read-break class="time-entry-read-row__break" th:text="#{time-entry.form.is-break.label}">Break</span>
            <span data-read-project class="time-entry-read-row__project"></span>
            <span data-read-comment class="time-entry-read-row__comment" th:if="${timeEntry.comment}" th:text="${timeEntry.comment}"></span>
            <svg class="time-entry-read-row__edit-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
              <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>
            </svg>
          </div>
        </th:block>
        <div class="time-entry-box flex flex-col md:flex-row">
          <div class="time-entry-box__inputs flex-1 flex flex-col md:flex-row">
            <div
              is="z-time-entry-date-picker"
              class="time-entry-box__input__date flex flex-col items-center"
              data-js-class-remove="flex-col"
            >
              <input
                type="date"
                id="input-entry-date"
                th:id="|${rnd}-input-entry-date|"
                name="date"
                class="text-black"
                value="2021-11-27"
                th:value="${#temporals.format(timeEntry.date, 'yyyy-MM-dd')}"
                th:min="${minValidTimeEntryDate eq null ? null : #temporals.format(minValidTimeEntryDate, 'yyyy-MM-dd')}"
                data-iso-value="2021-11-27"
                th:data-iso-value="${#temporals.format(timeEntry.date, 'yyyy-MM-dd')}"
                data-js-hidden
                th:disabled="${disabled}"
              />
              <label
                for="input-entry-date"
                th:for="|${rnd}-input-entry-date|"
                class="w-full flex"
                th:classappend="${disabled ? '' : 'cursor-pointer'}"
              >
                <span
                  data-day
                  class="rounded-full w-6 h-6 p-5 flex items-center justify-center bg-(--timeslot-form-day-background-color) timeslot-form-day text-black mr-4 font-bold"
                  th:text="${#temporals.day(timeEntry.date)}"
                >
                  21
                </span>
                <span class="flex-1 flex flex-col text-sm">
                  <span
                    data-day-text
                    class="font-semibold"
                    th:with="dayOfWeekName=${#temporals.dayOfWeekName(timeEntry.date)}"
                    th:text="${timeEntry.today ? #messages.msg('datepicker.today') + ', ' + dayOfWeekName : dayOfWeekName}"
                  >
                    Heute, Sonntag
                  </span>
                  <span
                    data-date
                    th:text="${#temporals.format(timeEntry.date, 'dd. MMMM yyyy')}"
                    class="whitespace-nowrap"
                  >
                    21. November 2021
                  </span>
                </span>
              </label>
            </div>
            <div class="time-entry-box__input__fields">
              <svg
                class="hidden md:block h-full text-(--timeslot-form-datepicker-background-color) border border-(--timeslot-form-border-color) border-l-0 border-r-0 dark:border-0"
                width="28"
                height="76"
                viewBox="0 0 28 76"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
                preserveAspectRatio="none"
              >
                <path
                  fill-rule="evenodd"
                  clip-rule="evenodd"
                  d="M0 76C36.4259 46.2385 36.507 29.5983 0 0V76Z"
                  fill="currentColor"
                />
              </svg>
              <div class="ajax-loader time-entry-cell-container">
                <div class="time-entry-cell time-entry-cell__comment">
                  <input
                    type="text"
                    id="input-entry-comment"
                    th:id="|${rnd}-input-entry-comment|"
                    name="comment"
                    th:value="${timeEntry.comment}"
                    th:placeholder="#{time-entry.form.comment.input.placeholder}"
                    th:disabled="${disabled}"
                    data-testid="input-time-entry-comment"
                  />
                  <label
                    for="input-entry-comment"
                    th:for="|${rnd}-input-entry-comment|"
                    th:text="#{time-entry.form.comment.label}"
                  >
                    Kommentar
                  </label>
                </div>
                <div class="time-entry-cell time-entry-cell__from">
                  <input
                    type="time"
                    id="input-entry-from"
                    th:id="|${rnd}-input-entry-from|"
                    name="start"
                    th:value="${timeEntry.start}"
                    placeholder="Von"
                    th:placeholder="#{time-entry.form.start.input.placeholder}"
                    class="peer invalid:border-(--z-error-border-color)"
                    th:classappend="${showErrors && #fields.hasErrors('start') && timeEntryErrorId == timeEntry.id ? 'invalid' : ''}"
                    th:disabled="${disabled}"
                    data-testid="input-time-entry-start"
                  />
                  <label
                    for="input-entry-from"
                    th:for="|${rnd}-input-entry-from|"
                    class="peer-invalid:text-(--z-error-color)"
                    th:classappend="${showErrors && #fields.hasErrors('start') && timeEntryErrorId == timeEntry.id ? 'invalid' : ''}"
                    th:text="#{time-entry.form.start.label}"
                  >
                    Von
                  </label>
                </div>
                <div class="time-entry-cell time-entry-cell__to">
                  <input
                    type="time"
                    id="input-entry-to"
                    th:id="|${rnd}-input-entry-to|"
                    name="end"
                    th:value="${timeEntry.end}"
                    placeholder="Bis"
                    th:placeholder="#{time-entry.form.end.input.placeholder}"
                    class="peer invalid:border-(--z-error-border-color)"
                    th:classappend="${showErrors && #fields.hasErrors('end') && timeEntryErrorId == timeEntry.id ? 'invalid' : ''}"
                    th:disabled="${disabled}"
                    data-testid="input-time-entry-end"
                  />
                  <label
                    for="input-entry-to"
                    th:for="|${rnd}-input-entry-to|"
                    class="peer-invalid:text-(--z-error-color)"
                    th:classappend="${showErrors && #fields.hasErrors('end') && timeEntryErrorId == timeEntry.id ? 'invalid' : ''}"
                    th:text="#{time-entry.form.end.label}"
                  >
                    Bis
                  </label>
                </div>
                <div class="time-entry-cell time-entry-cell__duration">
                  <input
                    is="z-time-entry-duration-input"
                    type="text"
                    id="input-entry-duration"
                    th:id="|${rnd}-input-entry-duration|"
                    name="duration"
                    th:value="${timeEntry.duration}"
                    placeholder="hh:mm"
                    th:placeholder="#{time-entry.form.duration.input.placeholder}"
                    class="peer invalid:border-(--z-error-border-color)"
                    th:classappend="${showErrors && #fields.hasErrors('duration') && timeEntryErrorId == timeEntry.id ? 'invalid' : ''}"
                    th:disabled="${disabled}"
                    data-testid="input-time-entry-duration"
                  />
                  <label
                    for="input-entry-duration"
                    th:for="|${rnd}-input-entry-duration|"
                    class="peer-invalid:text-(--z-error-color)"
                    th:classappend="${showErrors && #fields.hasErrors('duration') && timeEntryErrorId == timeEntry.id ? 'invalid' : ''}"
                    th:text="#{time-entry.form.duration.label}"
                  >
                    Dauer
                  </label>
                </div>
                <div class="time-entry-cell time-entry-cell__break">
                  <span class="checkbox-switch">
                    <input
                      type="checkbox"
                      id="input-entry-is-break"
                      th:id="|${rnd}-input-entry-is-break|"
                      name="break"
                      th:checked="${timeEntry.isBreak}"
                      class="peer mt-0.5"
                      th:disabled="${disabled}"
                      data-testid="input-time-entry-break"
                    />
                  </span>
                  <label
                    for="input-entry-is-break"
                    th:for="|${rnd}-input-entry-is-break|"
                    th:text="#{time-entry.form.is-break.label}"
                  >
                    Pause
                  </label>
                </div>
                <div th:if="${projects != null and not #lists.isEmpty(projects)}"
                     is="z-time-entry-project-select"
                     class="time-entry-cell time-entry-cell__project">
                  <select
                    name="projectId"
                    th:id="|${rnd}-input-entry-project|"
                    th:disabled="${disabled}"
                    data-project-select
                    th:classappend="${showErrors && timeEntry.id eq timeEntryErrorId && #fields.hasErrors('projectId') ? ' invalid' : ''}"
                    class="border border-gray-300 dark:border-zinc-600 rounded px-2 py-1 text-sm dark:bg-zinc-800"
                  >
                    <option value="" th:text="#{time-entry.project.none}">— No project —</option>
                    <option
                      th:each="p : ${projects}"
                      th:value="${p.id().value()}"
                      th:text="${p.name()}"
                      th:attr="data-customer-id=${p.customerId().value()},data-customer-name=${p.customerName()}"
                      th:selected="${timeEntry.projectId != null and timeEntry.projectId == p.id().value()}"
                    ></option>
                  </select>
                  <label
                    data-project-label
                    th:for="|${rnd}-input-entry-project|"
                  >
                    <span th:text="#{time-entry.project.label}">Project</span>
                    <span th:if="${categorisationSettings != null and categorisationSettings.projectRequired()}"
                          class="text-red-500" aria-hidden="true"> *</span>
                  </label>
                  <p th:if="${showErrors && timeEntry.id eq timeEntryErrorId && #fields.hasErrors('projectId')}"
                     th:text="${#fields.errors('projectId')[0]}"
                     class="invalid text-xs mt-1"></p>
                </div>
                <div th:if="${activityTypes != null and not #lists.isEmpty(activityTypes)}" class="time-entry-cell time-entry-cell__activity-type">
                  <select
                    name="activityTypeId"
                    th:id="|${rnd}-input-entry-activity-type|"
                    th:disabled="${disabled}"
                    th:classappend="${showErrors && timeEntry.id eq timeEntryErrorId && #fields.hasErrors('activityTypeId') ? ' invalid' : ''}"
                    class="border border-gray-300 dark:border-zinc-600 rounded px-2 py-1 text-sm dark:bg-zinc-800"
                  >
                    <option value="" th:text="#{time-entry.activity-type.none}">— No activity —</option>
                    <option
                      th:each="at : ${activityTypes}"
                      th:value="${at.id().value()}"
                      th:text="${at.name()}"
                      th:selected="${timeEntry.activityTypeId != null and timeEntry.activityTypeId == at.id().value()}"
                    ></option>
                  </select>
                  <label th:for="|${rnd}-input-entry-activity-type|">
                    <span th:text="#{time-entry.activity-type.label}">Activity</span>
                    <span th:if="${categorisationSettings != null and categorisationSettings.activityTypeRequired()}"
                          class="text-red-500" aria-hidden="true"> *</span>
                  </label>
                  <p th:if="${showErrors && timeEntry.id eq timeEntryErrorId && #fields.hasErrors('activityTypeId')}"
                     th:text="${#fields.errors('activityTypeId')[0]}"
                     class="invalid text-xs mt-1"></p>
                </div>
              </div>
            </div>
          </div>
          <th:block th:if="${actions}">
            <div class="time-entry-box__controls">
              <th:block th:if="${!disabled}">
                <div th:replace="${actions}"></div>
              </th:block>
            </div>
          </th:block>
        </div>
        <div class="text-red-600" data-error-container>
          <ul
            th:if="${showErrors && timeEntry.id eq timeEntryErrorId && #fields.hasGlobalErrors()}"
          >
            <li th:each="err : ${#fields.globalErrors()}" th:text="${err}">
              Etwas stimmt nicht, Jim.
            </li>
          </ul>
        </div>
      </div>
    </form>
  </body>
</html>
