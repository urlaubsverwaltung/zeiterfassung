<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Navigation fragment</title>
  </head>
  <body>
    <!-- @thymesVar id="signedInUser" type="de.focusshift.zeiterfassung.web.SignedInUserDto" -->

    <div th:fragment="timeclock">
      <form
        th:if="${timeClock == null}"
        action="#"
        th:action="@{/timeclock/start}"
        method="post"
        class="flex items-center"
      >
        <button
          type="submit"
          class="button-primary button-primary-icon pl-3 pr-4 py-1 text-lg rounded-full"
        >
          <svg th:replace="~{icons/play::svg(className='w-6 h-6 mr-1.5')}" />
          <span th:text="#{timeclock.start}"> Start </span>
        </button>
      </form>
      <div th:if="${timeClock != null}" class="flex items-center gap-4">
        <details
          class="time-clock-dropdown mr-4 sr-only xs:not-sr-only xs:relative"
          is="z-details-dropdown"
        >
          <summary id="time-clock-summary" class="time-clock-dropdown_summary">
            <span
              class="sr-only"
              th:text="#{timeclock.elapsed-time.label}"
            ></span>
            <span
              class="text-lg"
              th:text="${timeClock.duration}"
              th:data-started-at="${timeClock.startedAt}"
              is="z-time-clock-duration"
            ></span>
            <svg
              th:replace="~{icons/chevron-down::svg(className='w-4 h-4')}"
            ></svg>
          </summary>
          <div class="time-clock-dropdown_content">
            <div
              th:replace="~{timeclock/timeclock-edit-form::navigation-box}"
            ></div>
          </div>
        </details>
        <form
          action="#"
          th:action="@{/timeclock/stop}"
          method="post"
          class="flex items-center"
        >
          <button
            type="submit"
            class="bg-red-700 text-white py-1 pl-2 pr-3 text-lg font-medium rounded-full flex items-center gap-1.5 hover:bg-red-600 transition-colors"
          >
            <svg
              th:replace="~{icons/stop::svg(className='text-red-100 w-6 h-6')}"
            />
            <span th:text="#{timeclock.stop}"> Stop </span>
          </button>
        </form>
      </div>
    </div>

    <div th:fragment="avatar">
      <button
        popovertarget="avatar-menu"
        class="flex items-center gap-1"
        data-testid="avatar"
      >
        <span class="shrink-0 inline-flex text-blue-200">
          <img
            th:replace="~{fragments/avatar::avatar(className='w-8 h-8 lg:w-9 lg:h-9', initials=${signedInUser.initials},fullName=${signedInUser.fullName},width='40',height='40',tooltip=false)}"
            alt=""
          />
        </span>
        <svg th:replace="~{icons/chevron-down::svg(className='w-4 h-4')}"></svg>
      </button>
      <div
        popover
        id="avatar-menu"
        class="nav-popover-menu-container nav-avatar-popover popover popover--slide-to-left"
        data-testId="avatar-popupmenu"
      >
        <div class="navigation-popover-menu-header">
          <a
            href="#"
            th:href="@{/web/person/{userId}/overview(userId=${signedInUser.id})}"
            class="flex items-center gap-4 no-underline"
          >
            <span class="text-blue-200">
              <img
                th:replace="~{fragments/avatar::avatar(initials=${signedInUser.initials},fullName=${signedInUser.fullName},width='64',height='64',tooltip=false)}"
                alt=""
              />
            </span>
            <span class="block whitespace-nowrap overflow-hidden text-ellipsis">
              <span
                th:text="#{navigation.avatar-menu.signed-in-as}"
                class="text-sm block text-gray-600"
              ></span>
              <span
                class="text-lg leading-none text-gray-600"
                th:text="${signedInUser.fullName}"
              >
                Max Mustermann
              </span>
            </span>
          </a>
        </div>
        <div class="navigation-popover-menu-content">
          <ul class="navigation-popover-menu">
            <li>
              <form th:action="@{/logout}" method="POST">
                <button
                  type="submit"
                  class="navigation-popover-menu__link"
                  data-testid="logout"
                >
                  <svg
                    th:replace="~{icons/logout::svg(className='w-6 h-6')}"
                  ></svg>
                  <th:block
                    th:text="#{navigation.avatar-menu.logout}"
                  ></th:block>
                </button>
              </form>
            </li>
          </ul>
        </div>
      </div>
    </div>

    <a
      th:with="external=${false}"
      th:fragment="nav-popup-menu-link(href, icon, text)"
      th:href="${href}"
      class="navigation-popover-menu__link"
      th:data-testid="${dataTestId}"
    >
      <svg th:replace="${icon}"></svg>
      <span
        class="whitespace-nowrap text-ellipsis overflow-hidden"
        style="min-width: 0"
        th:text="${text}"
      ></span>
    </a>

    <a
      th:fragment="nav-popup-menu-link-external(href, icon, text)"
      th:href="${href}"
      class="navigation-popover-menu__link"
      target="_blank"
      rel="noopener"
      th:data-testid="${dataTestId}"
    >
      <svg th:replace="${icon}"></svg>
      <span class="flex items-center gap-2">
        <span
          class="whitespace-nowrap text-ellipsis overflow-hidden"
          style="min-width: 0"
          th:text="${text}"
        ></span>
        <svg
          th:replace="~{icons/external-link::svg(className='h-4 w-4')}"
        ></svg>
      </span>
    </a>
  </body>
</html>
